<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin's Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="weather-container">
        <h1>Kevin's Weather App</h1>
        <input type="text" id="city-input" placeholder="Enter city name">
        <button id="search-button">Search</button>
        <h2 id="city"></h2>
        <img id="weather-image" width="100px" height="100px">
        <p><b>Temperature:</b> <span id="temperature"></span>°C</p>
        <p><b>Condition:</b> <span id="weather-condition"></span></p>
        <p><b>Wind Speed:</b> <span id="wind-speed"></span>km/h</p>
    </div>
    <script src="script.js"></script>
</body>

</html>
